spring:
  application:
    name: strawberry-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/strawberry_db
    username: strawberry_user
    password: strawberry_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: strawberry_mq
    password: strawberry_mq_password
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: VmVyeVNlY3JldEtleUZvckpXVFNpZ25hdHVyZVN0cmF3YmVycnlFY29tbWVyY2VQbGF0Zm9ybTIwMjY=
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG
    com.strawberry.ecommerce: DEBUG
    org.hibernate.orm.query: DEBUG
    org.springframework.data.repository: DEBUG
    org.springframework.beans.factory: DEBUG
    org.flywaydb: DEBUG


