spring:
  application:
    name: strawberry-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/strawberry_db}
    username: ${SPRING_DATASOURCE_USERNAME:strawberry_user}
    password: ${SPRING_DATASOURCE_PASSWORD:strawberry_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:strawberry_mq}
    password: ${SPRING_RABBITMQ_PASSWORD:strawberry_mq_password}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    rabbit:
      enabled: true

info:
  app:
    name: Strawberry E-Commerce
    service: backend

logging:
  level:
    org.springframework.security: DEBUG
    com.strawberry.ecommerce: DEBUG
    org.hibernate.orm.query: DEBUG
    org.springframework.data.repository: DEBUG
    org.springframework.beans.factory: DEBUG
    org.flywaydb: DEBUG


cloudinary:
  url: ${CLOUDINARY_URL:}
