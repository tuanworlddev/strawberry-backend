spring:
  application:
    name: strawberry-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/strawberry_db
    username: strawberry_user
    password: postgres_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: strawberry_mq
    password: strawberry_mq_password
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ZGV2LXNlY3JldC1yZXBsYWNlLW1lLXdpdGgtcmVhbC1iYXNlNjQ=
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    rabbit:
      enabled: true

info:
  app:
    name: Strawberry E-Commerce
    service: backend

logging:
  level:
    org.springframework.security: DEBUG
    com.strawberry.ecommerce: DEBUG
    org.hibernate.orm.query: DEBUG
    org.springframework.data.repository: DEBUG
    org.springframework.beans.factory: DEBUG
    org.flywaydb: DEBUG


cloudinary:
  url: ${CLOUDINARY_URL:}
